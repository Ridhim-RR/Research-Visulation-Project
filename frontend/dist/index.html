<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EEG Visualization</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/assets/index-CA-cwvxp.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-dYMqvIt4.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero panel">
      <div>
        <p class="eyebrow">Research Visualization</p>
        <h1>EEG Visualizer</h1>
        <p class="subtitle">Upload a MAT file and view the backend-generated Semani visualizations.</p>
      </div>
      <div class="status-chip" id="backendStatus">Backend idle</div>
    </header>

    <section class="upload panel">
      <form id="uploadForm" class="upload-form">
        <label class="file-field">
          <span>Upload MAT File</span>
          <input id="fileInput" type="file" accept=".mat" required />
        </label>
        <button type="submit" class="btn btn-primary">Show Visualization</button>
      </form>
      <output id="status" class="status" aria-live="polite">Ready.</output>
      <div id="error" class="error" role="alert" hidden></div>
    </section>

    <section class="results panel">
      <div class="results-heading">
        <h2>Visualization Output</h2>
        <p>Backend response is rendered below after upload.</p>
      </div>

      <div class="results-grid">
        <article class="result-card">
          <h3>Semani Figure</h3>
          <img id="semaniImage" class="result-image" alt="Semani figure output" />
        </article>

        <article class="result-card">
          <h3>Channels Figure</h3>
          <img id="channelsImage" class="result-image" alt="Channels figure output" />
        </article>
      </div>
    </section>
  </main>

</body>
</html>
